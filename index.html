<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#07110e">
  <meta name="description" content="Kung Fu: Return of the Green Dragon Master — a web-first 2D wuxia action RPG.">
  <title>Kung Fu: Return of the Green Dragon Master</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="assets/embedded/icon.svg">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main id="game-shell">
    <canvas id="game" width="960" height="540" aria-label="Kung Fu: Return of the Green Dragon Master"></canvas>
    <div id="loading"><strong>Lighting the jade lanterns…</strong><span id="loading-progress">0%</span></div>
    <div id="touch-controls" aria-label="Touch controls">
      <div class="touch-cluster movement">
        <button data-key="KeyA" aria-label="Move left">◀</button>
        <button data-key="KeyD" aria-label="Move right">▶</button>
        <button data-key="KeyW" aria-label="Jump or move up">▲</button>
        <button data-key="KeyS" aria-label="Crouch, block or move down">▼</button>
      </div>
      <div class="touch-cluster actions">
        <button data-key="KeyE" aria-label="Interact">E</button>
        <button data-key="KeyJ" aria-label="Punch">J</button>
        <button data-key="KeyK" aria-label="Kick">K</button>
        <button data-key="KeyL" aria-label="Weapon">L</button>
      </div>
    </div>
  </main>
  <p class="assistive">Keyboard: WASD or arrows to move, E to interact, M for menu. In battle use J punch, K kick, L weapon, I chi technique and S block.</p>
  <script type="module" src="src/game.js"></script>
</body>
</html>
