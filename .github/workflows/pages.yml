name: Deploy web game to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JavaScript game systems
        run: node tests/smoke.mjs
      - name: Validate embedded production assets
        run: test -s assets/embedded/key-art.svg && test -s assets/embedded/fighter-top.svg && test -s assets/embedded/stages-1.svg
      - name: Assemble static game
        run: |
          mkdir -p _site
          cp index.html styles.css manifest.webmanifest _site/
          cp -R src assets _site/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
