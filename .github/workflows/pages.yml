name: Deploy web game to GitHub Pages
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate generated fighter pipeline
        run: node tests/assets.mjs
      - name: Validate named art and combat systems
        run: node tests/named-art.mjs
      - name: Validate feel and UX polish
        run: node tests/polish.mjs
      - name: Validate progression, quest and accessibility systems
        run: node tests/systems.mjs
      - name: Validate living world, party and offline systems
        run: node tests/living-world.mjs
      - name: Validate JavaScript game systems
        run: node tests/smoke.mjs
  deploy:
    if: github.event_name != 'pull_request'
    needs: validate
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assemble static game
        run: |
          mkdir -p _site
          cp index.html styles.css manifest.webmanifest sw.js _site/
          cp -R src assets _site/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
