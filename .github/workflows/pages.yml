name: Deploy web game to GitHub Pages
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate generated fighter pipeline
        run: node tests/assets.mjs
      - name: Validate named art and combat systems
        run: node tests/named-art.mjs
      - name: Validate feel and UX polish
        run: node tests/polish.mjs
      - name: Validate progression, quest and accessibility systems
        run: node tests/systems.mjs
      - name: Validate living world wiring and offline cache
        run: node tests/living-world.mjs static
      - name: Validate living world runtime behaviour
        run: node tests/living-world.mjs runtime
      - name: Validate Act II wiring and offline cache
        run: node tests/act-two.mjs static
      - name: Validate Act II JavaScript modules
        run: node --check src/act-two.js && node --check src/act-two-compat.js
      - name: Validate Act II module API
        run: node tests/act-two.mjs module
      - name: Validate Act II fresh-save enrichment
        run: node tests/act-two.mjs fresh-save
      - name: Validate Act II unlock flag
        run: node tests/act-two.mjs unlock-flag
      - name: Validate Act II travel handoff
        run: node tests/act-two.mjs unlock-location
      - name: Validate Act II region installation
        run: node tests/act-two.mjs regions
      - name: Validate Act II opening quest activation
        run: node tests/act-two.mjs opening
      - name: Validate Act II river orphan side story
        run: node tests/act-two.mjs orphans
      - name: Validate Act II Needle Crow chapter
        run: node tests/act-two.mjs river
      - name: Validate Act II Ghost Face Opera chapter
        run: node tests/act-two.mjs opera
      - name: Validate Act II Five-Clan Council chapter
        run: node tests/act-two.mjs council
      - name: Validate Act II tournament and Jade Court finale
        run: node tests/act-two.mjs runtime
      - name: Validate Act III wiring and offline cache
        run: node tests/act-three.mjs static
      - name: Validate Act III JavaScript module
        run: node --check src/act-three.js
      - name: Validate Act III module API
        run: node tests/act-three.mjs module
      - name: Validate Act III fresh-save enrichment
        run: node tests/act-three.mjs fresh-save
      - name: Validate Act III unlock and northern road
        run: node tests/act-three.mjs unlock
      - name: Validate Act III region installation
        run: node tests/act-three.mjs regions
      - name: Validate Act III Iron Prayer chapter
        run: node tests/act-three.mjs monastery
      - name: Validate Act III Snow Lotus chapter
        run: node tests/act-three.mjs village
      - name: Validate Act III three standards
        run: node tests/act-three.mjs standards
      - name: Validate Act III Ghost Face founder
        run: node tests/act-three.mjs founder
      - name: Validate Act III vanished heir
        run: node tests/act-three.mjs heir
      - name: Validate Act III constellation and regent finale
        run: node tests/act-three.mjs runtime
      - name: Validate Act IV wiring and offline cache
        run: node tests/act-four.mjs static
      - name: Validate Act IV JavaScript module
        run: node --check src/act-four.js
      - name: Validate Act IV module API
        run: node tests/act-four.mjs module
      - name: Validate Act IV fresh-save enrichment
        run: node tests/act-four.mjs fresh-save
      - name: Validate Act IV unlock and capital road
        run: node tests/act-four.mjs unlock
      - name: Validate Act IV region installation
        run: node tests/act-four.mjs regions
      - name: Validate Act IV capital gate chapter
        run: node tests/act-four.mjs gate
      - name: Validate Act IV petitions chapter
        run: node tests/act-four.mjs petitions
      - name: Validate Act IV Ghost Face schism
        run: node tests/act-four.mjs masks
      - name: Validate Act IV Vermilion Arsenal
        run: node tests/act-four.mjs arsenal
      - name: Validate Act IV imperial testament
        run: node tests/act-four.mjs testament
      - name: Validate Act IV empty throne
        run: node tests/act-four.mjs throne
      - name: Validate Act IV mandate selection
        run: node tests/act-four.mjs choice
      - name: Validate Act IV chancellor finale
        run: node tests/act-four.mjs runtime
      - name: Validate Legacy Journey wiring and offline cache
        run: node tests/legacy-journey.mjs static
      - name: Validate Legacy Journey JavaScript module
        run: node --check src/legacy-journey.js
      - name: Validate Legacy Journey module API
        run: node tests/legacy-journey.mjs module
      - name: Validate Legacy Journey save enrichment
        run: node tests/legacy-journey.mjs fresh-save
      - name: Validate Legacy Hall unlock
        run: node tests/legacy-journey.mjs hall
      - name: Validate Legacy boss gauntlet
        run: node tests/legacy-journey.mjs gauntlet
      - name: Validate permanent Legacy blessings
        run: node tests/legacy-journey.mjs blessing
      - name: Validate New Game Plus inheritance
        run: node tests/legacy-journey.mjs cycle
      - name: Validate Legacy enemy scaling and ending gift
        run: node tests/legacy-journey.mjs runtime
      - name: Validate Wuxia presentation JavaScript
        run: node --check src/wuxia-presentation.js
      - name: Validate Wuxia presentation wiring and styling
        run: node tests/wuxia-presentation.mjs static
      - name: Validate Wuxia presentation runtime
        run: node tests/wuxia-presentation.mjs runtime
      - name: Validate JavaScript game systems
        run: node tests/smoke.mjs
  deploy:
    if: github.event_name != 'pull_request'
    needs: validate
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assemble static game
        run: |
          mkdir -p _site
          cp index.html styles.css manifest.webmanifest sw.js sw-act2.js sw-act3.js sw-act4.js sw-legacy.js _site/
          cp -R src assets _site/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
